<head>
<meta charset="UTF-8">
<title>换皮 Skill 知识图谱</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    color: #e6edf3;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(13,17,23,0.95);
    border-bottom: 1px solid #21262d;
    display: flex; align-items: center; padding: 0 20px;
    z-index: 100;
    gap: 16px;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  #header .subtitle { font-size: 12px; color: #8b949e; }

  #mode-tabs {
    display: flex; gap: 6px; margin-left: auto;
  }
  .tab-btn {
    padding: 5px 14px; border-radius: 6px; border: 1px solid #30363d;
    background: transparent; color: #8b949e; cursor: pointer; font-size: 12px;
    transition: all 0.2s;
  }
  .tab-btn:hover { background: #21262d; color: #e6edf3; }
  .tab-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  #canvas { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

  /* Sidebar */
  #sidebar {
    position: fixed; right: 0; top: 52px; bottom: 0;
    width: 320px;
    background: rgba(13,17,23,0.97);
    border-left: 1px solid #21262d;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    overflow-y: auto;
    z-index: 50;
    padding: 20px;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar h2 { font-size: 15px; color: #f0f6fc; margin-bottom: 8px; }
  #sidebar .table-id { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  #sidebar .table-desc { font-size: 13px; color: #8b949e; margin-bottom: 16px; border-bottom: 1px solid #21262d; padding-bottom: 16px; }
  #sidebar .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #8b949e; margin-bottom: 8px; margin-top: 16px; }
  #sidebar .field-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; font-size: 12px; }
  #sidebar .field-col { background: #21262d; color: #79c0ff; padding: 1px 6px; border-radius: 4px; font-family: monospace; flex-shrink: 0; }
  #sidebar .field-name { color: #a5d6ff; font-family: monospace; }
  #sidebar .field-action { margin-left: auto; flex-shrink: 0; }
  .action-change { color: #ffa657; }
  .action-keep { color: #56d364; }
  .action-new { color: #ff7b72; }
  .action-opt { color: #8b949e; }
  #sidebar .dep-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: #21262d; border-radius: 4px; padding: 3px 8px;
    font-size: 11px; margin: 3px 3px 0 0; cursor: pointer;
    border: 1px solid #30363d; transition: all 0.15s;
  }
  #sidebar .dep-tag:hover { background: #30363d; }
  #sidebar .dep-tag .arrow { color: #8b949e; font-size: 9px; }
  #sidebar .pattern-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; margin: 2px; font-weight: 500;
  }
  #close-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: #8b949e;
    cursor: pointer; font-size: 18px; line-height: 1;
  }
  #close-btn:hover { color: #e6edf3; }

  /* Legend */
  #legend {
    position: fixed; left: 16px; bottom: 20px;
    background: rgba(13,17,23,0.9);
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 11px;
    z-index: 50;

  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leg-label { color: #e6edf3; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(22,27,34,0.98);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    max-width: 240px;
  }
  #tooltip .tt-id { font-weight: 700; color: #f0f6fc; }
  #tooltip .tt-desc { color: #8b949e; margin-top: 2px; }

  #pattern-panel {
    position: fixed; left: 16px; top: 68px;
    background: rgba(13,17,23,0.95);
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 11px;
    z-index: 50;
    width: 200px;

  .pattern-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
    cursor: pointer; padding: 4px 6px; border-radius: 5px;
    transition: background 0.15s;
  }
  .pattern-row:hover { background: #21262d; }
  .pattern-row.active { background: #21262d; }
  .pattern-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .pattern-name { color: #e6edf3; font-size: 11px; }
  .pattern-count { margin-left: auto; color: #8b949e; font-size: 10px; }

  svg .node circle {
    cursor: pointer;
    transition: r 0.2s;
  }
  svg .node:hover circle { filter: brightness(1.3); }
  svg .link {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.5;
  }
  svg .link.highlight { opacity: 1; stroke-width: 2.5; }
  svg .link.dimmed { opacity: 0.08; }
  svg .node.dimmed circle { opacity: 0.15; }
  svg .node.dimmed text { opacity: 0.15; }
  svg .node.highlighted circle { filter: brightness(1.4); }
  svg .node text { pointer-events: none; }
</style>
</head>

<div id="legend">

<div id="tooltip">

<div id="sidebar">

      { col: '[0]', name: 'A_INT_id', role: '行ID=组×100+星级', action: '换', actionClass: 'action-change' },
      { col: '[5]', name: 'A_INT_paint', role: '涂饰开关0/1', action: '扩星+涂饰', actionClass: 'action-change' },
      { col: '[14]', name: 'A_ARR_BUFF', role: 'BUFF按星递增', action: '换', actionClass: 'action-change' },
      { col: '[15]', name: 'C_ARR_paint_item', role: '涂饰道具ID', action: '换', actionClass: 'action-change' },
      { col: '[19]', name: 'A_INT_decroation_paint_skill', role: '涂饰技能行→2171', action: '换', actionClass: 'action-change' },
    ],
    patterns: ['C'],
    notes: 'P2专属：X2无涂饰系统(paint/paint_buff/paint_skill字段)',
  },
  '2171': {
    fields: [
      { col: '[0]', name: 'A_INT_id', role: '行ID=组×10+级别', action: '换', actionClass: 'action-change' },
      { col: '[5]', name: 'C_MAP_lc_name', role: '技能名 LC key', action: '换', actionClass: 'action-change' },
      { col: '[12]', name: 'A_ARR_status', role: '技能效果BUFF数组', action: '换', actionClass: 'action-change' },
    ],
    patterns: ['C'],
    notes: '⚠️ P2专属！X2的2171是ActivityCollaborateTask，完全不同用途',
  },
  '1127': {
    fields: [
      { col: '[1]', name: 'A_INT_id', role: '行ID', action: '换', actionClass: 'action-change' },
      { col: '[3]', name: 'A_ARR_building_ids', role: '关联1118建筑组ID', action: '换', actionClass: 'action-change' },
      { col: '[10]', name: 'A_ARR_unlock_cost', role: '解锁消耗→1111道具', action: '换', actionClass: 'action-change' },
      { col: '[14]', name: 'C_INT_subtab', role: '装饰固定=4', action: '不换', actionClass: 'action-keep' },
    ],
    patterns: ['C'],
    notes: '旧装饰扩星不需要。仅新建筑/新装饰才加一行',
  },
  '1168': {
    fields: [
      { col: '[0]', name: 'A_INT_id', role: '行ID（1168xxxx）', action: '换', actionClass: 'action-change' },
      { col: '[2]', name: 'A_STR_constant', role: '唯一标识', action: '必须新增', actionClass: 'action-new' },
      { col: '[4]', name: 'C_ARR_access_group', role: '获取途径列表', action: '换', actionClass: 'action-change' },
    ],
    patterns: ['C'],
    notes: '装饰物：每星一行，关联2148行ID',
  },
  '1511': {
    fields: [
      { col: '—', name: 'DK ID', role: 'key→美术资源路径映射', action: '按需录入', actionClass: 'action-change' },
    ],
    patterns: ['A','B','C','D'],
    notes: '录入操作见 x2-dk-manager skill。新装饰每★需全部录入DK',
  },
  '1011': {
    fields: [
      { col: 'col1', name: 'LC_KEY', role: '完整LC key', action: '换', actionClass: 'action-change' },
      { col: 'col2', name: 'key', role: '短key', action: '换', actionClass: 'action-change' },
      { col: 'col3', name: '中文', role: '中文文本', action: '换', actionClass: 'action-change' },
      { col: 'col4', name: 'English', role: '英文文本', action: '换', actionClass: 'action-change' },
    ],
    patterns: ['A','B','C','D','E'],
    notes: '横切关注点。P2/X2结构相同。集卡册有6+1区域结构',
  },
  '6001': { fields: [{ col: '—', name: 'A_ARR_group_id', role: '引用6002组', action: '换', actionClass: 'action-change' }], patterns: ['D'], notes: '集卡册顶层，rewards外键必须逐一验证' },
  '6002': { fields: [{ col: '—', name: 'A_ARR_card_id', role: '引用6003卡片', action: '换', actionClass: 'action-change' }], patterns: ['D'], notes: '组奖励每个item id都要查1111验证节日归属' },
  '6003': { fields: [{ col: '—', name: 'A_INT_star', role: '5★标识', action: '换', actionClass: 'action-change' }], patterns: ['D'], notes: '单张卡片，col[2]=A_INT_star判断5★' },
  '6004': { fields: [{ col: '—', name: 'goods_id', role: '当前节日保底卡包ID', action: '每次换节日必改', actionClass: 'action-new' }], patterns: ['D'], notes: '⚠️ 每次换节日必须同步更新goods_id' },
  '2121': { fields: [{ col: '—', name: 'jump_link', role: '机甲累充跳转目标', action: '换', actionClass: 'action-change' }], patterns: ['E'], notes: '机甲累充专用，被2112的jump_link组件引用' },
};

const patternColors = { A:'#ffa657', B:'#79c0ff', C:'#56d364', D:'#bc8cff', E:'#ff7b72', F:'#f78166' };

// ===================== D3 SETUP =====================
const width = window.innerWidth;
const height = window.innerHeight - 52;

const svg = d3.select('#canvas')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

// Arrow markers
const defs = svg.append('defs');
['ref','back','lc'].forEach(type => {
  const colors = { ref: '#8b949e', back: '#388bfd', lc: '#e3b341' };
  defs.append('marker')
    .attr('id', `arrow-${type}`)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 18)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', colors[type]);
});

const g = svg.append('g');

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.3, 3])
  .on('zoom', e => g.attr('transform', e.transform)));

// Force simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'lc' ? 180 : 110).strength(0.6))
  .force('charge', d3.forceManyBody().strength(-600))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide(d => d.size + 20));

// Links
const linkGroup = g.append('g').attr('class', 'links');
const link = linkGroup.selectAll('.link')
  .data(links)
  .enter().append('g').attr('class', 'link-group');

const linkLine = link.append('line')
  .attr('class', d => `link link-${d.type}`)
  .attr('stroke', d => ({ ref:'#8b949e', back:'#388bfd', lc:'#e3b341' }[d.type]))
  .attr('stroke-dasharray', d => d.type === 'back' ? '4,3' : d.type === 'lc' ? '2,4' : null)
  .attr('marker-end', d => `url(#arrow-${d.type})`);

// Nodes
const nodeGroup = g.append('g').attr('class', 'nodes');
const node = nodeGroup.selectAll('.node')
  .data(nodes)
  .enter().append('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', dragStart)
    .on('drag', dragged)
    .on('end', dragEnd));

node.append('circle')
  .attr('r', d => d.size)
  .attr('fill', d => groupColors[d.group])
  .attr('stroke', d => d3.color(groupColors[d.group]).brighter(0.5))
  .attr('stroke-width', 1.5);

node.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '0.35em')
  .attr('font-size', d => d.size > 30 ? '14px' : d.size > 24 ? '12px' : '10px')
  .attr('font-weight', '600')
  .attr('fill', '#fff')
  .text(d => d.label);

// Node events
node
  .on('mouseenter', (event, d) => {
    const tt = document.getElementById('tooltip');
    document.getElementById('tt-id').textContent = `${d.id} — ${d.name}`;
    document.getElementById('tt-desc').textContent = d.desc;
    tt.style.opacity = 1;
    tt.style.left = (event.clientX + 12) + 'px';
    tt.style.top = (event.clientY - 10) + 'px';
  })
  .on('mousemove', (event) => {
    const tt = document.getElementById('tooltip');
    tt.style.left = (event.clientX + 12) + 'px';
    tt.style.top = (event.clientY - 10) + 'px';
  })
  .on('mouseleave', () => {
    document.getElementById('tooltip').style.opacity = 0;
  })
  .on('click', (event, d) => {
    event.stopPropagation();
    openSidebar(d);
  });

// Simulation tick
simulation.on('tick', () => {
  linkLine
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ===================== DRAG =====================
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ===================== SIDEBAR =====================
function openSidebar(d) {
  const detail = nodeDetails[d.id] || {};
  const patternList = (detail.patterns || []).map(p =>
    `<span class="pattern-badge" style="background:${patternColors[p]}22;color:${patternColors[p]};border:1px solid ${patternColors[p]}55">${p} ${patterns[p]?.name||''}</span>`
  ).join('');

  const fieldRows = (detail.fields || []).map(f =>
    `<div class="field-row">
      <span class="field-col">${f.col}</span>
      <span class="field-name">${f.name}</span>
      <span class="field-action ${f.actionClass}">${f.action}</span>
    </div>`
  ).join('');

  // Deps
  const outDeps = links.filter(l => (l.source.id||l.source) === d.id)
    .map(l => `<span class="dep-tag" onclick="focusNode('${l.target.id||l.target}')">→ <b>${l.target.id||l.target}</b> <span class="arrow">${l.label}</span></span>`).join('');
  const inDeps = links.filter(l => (l.target.id||l.target) === d.id)
    .map(l => `<span class="dep-tag" onclick="focusNode('${l.source.id||l.source}')"><b>${l.source.id||l.source}</b> → <span class="arrow">${l.label}</span></span>`).join('');

  document.getElementById('sidebar-content').innerHTML = `
    <div class="table-id" style="color:${groupColors[d.group]}">${d.id}</div>
    <div style="font-size:15px;font-weight:600;color:#f0f6fc;margin-bottom:4px">${d.name}</div>
    <div class="table-desc">${d.desc}</div>
    ${detail.notes ? `<div style="background:#21262d;border-radius:6px;padding:8px 10px;font-size:12px;color:#ffa657;margin-bottom:12px">⚠️ ${detail.notes}</div>` : ''}
    <div class="section-title">重点字段</div>
    ${fieldRows || '<div style="color:#8b949e;font-size:12px">见 modules-p2.md</div>'}
    <div class="section-title">参与组装模式</div>
    <div>${patternList || '<span style="color:#8b949e;font-size:12px">暂无</span>'}</div>
    ${outDeps ? `<div class="section-title">依赖（向外）</div><div>${outDeps}</div>` : ''}
    ${inDeps ? `<div class="section-title">被引用（向内）</div><div>${inDeps}</div>` : ''}
  `;

  document.getElementById('sidebar').classList.add('open');
  highlightNode(d.id);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  clearHighlight();
}

function focusNode(id) {
  const d = nodes.find(n => n.id === id);
  if (d) openSidebar(d);
}

// ===================== HIGHLIGHT =====================
let activePattern = null;

function highlightPattern(p) {
  activePattern = p;
  document.querySelectorAll('.pattern-row').forEach(el => {
    el.classList.toggle('active', el.dataset.pattern === p);
  });

  if (!p) {
    clearHighlight();
    return;
  }

  const patternNodes = new Set(patterns[p].nodes);
  const patternLinks = new Set(
    links.filter(l => patternNodes.has(l.source.id||l.source) && patternNodes.has(l.target.id||l.target))
      .map((_, i) => i)
  );

  node.classed('highlighted', d => patternNodes.has(d.id));
  node.classed('dimmed', d => !patternNodes.has(d.id));
  linkLine.classed('highlight', (d, i) => patternLinks.has(i));
  linkLine.classed('dimmed', (d, i) => !patternLinks.has(i));

  node.select('circle').attr('stroke', d => {
    if (patternNodes.has(d.id)) return patterns[p].color;
    return d3.color(groupColors[d.group]).brighter(0.5);
  }).attr('stroke-width', d => patternNodes.has(d.id) ? 3 : 1.5);
}

function highlightNode(id) {
  const connectedIds = new Set([id]);
  links.forEach(l => {
    if ((l.source.id||l.source) === id) connectedIds.add(l.target.id||l.target);
    if ((l.target.id||l.target) === id) connectedIds.add(l.source.id||l.source);
  });

  node.classed('highlighted', d => d.id === id);
  node.classed('dimmed', d => !connectedIds.has(d.id));
  linkLine.classed('highlight', d => (d.source.id||d.source) === id || (d.target.id||d.target) === id);
  linkLine.classed('dimmed', d => (d.source.id||d.source) !== id && (d.target.id||d.target) !== id);
}

function clearHighlight() {
  node.classed('highlighted dimmed', false);
  linkLine.classed('highlight dimmed', false);
  node.select('circle')
    .attr('stroke', d => d3.color(groupColors[d.group]).brighter(0.5))
    .attr('stroke-width', 1.5);
}

function setView(mode) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','p2','x2','pattern'][i] === mode);
  });

  if (mode === 'all') { clearHighlight(); return; }
  if (mode === 'p2') {
    const p2Only = new Set(['2112','2115','2135','2011','2013','1111','1118','2148','2171','1127','1168','1511','1011']);
    applyNodeFilter(p2Only);
  }
  if (mode === 'x2') {
    // X2 no 2171 no decor paint
    const x2Nodes = new Set(['2112','2115','2135','2011','2013','1111','1118','2148','1127','1168','1511','1011','6001','6002','6003','6004']);
    applyNodeFilter(x2Nodes);
  }
  if (mode === 'pattern') {
    clearHighlight();
  }
}

function applyNodeFilter(nodeSet) {
  node.classed('dimmed', d => !nodeSet.has(d.id));
  node.classed('highlighted', false);
  linkLine.classed('dimmed', d => !nodeSet.has(d.source.id||d.source) || !nodeSet.has(d.target.id||d.target));
  linkLine.classed('highlight', false);
}

svg.on('click', () => { closeSidebar(); clearHighlight(); });
</script>
</body>
</html>

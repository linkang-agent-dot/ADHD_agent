<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节日活动知识图谱编辑器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: #16213e;
            border-radius: 10px;
        }
        .header h1 { font-size: 1.5em; color: #00d9ff; }
        .header-actions { display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-primary:hover { background: #00b8d9; }
        .btn-success { background: #00c853; color: #fff; }
        .btn-success:hover { background: #00a844; }
        .btn-warning { background: #ff9800; color: #fff; }
        .btn-warning:hover { background: #e68900; }
        .btn-danger { background: #f44336; color: #fff; }
        .btn-danger:hover { background: #d32f2f; }

        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 16px;
            background: #16213e;
            border: none;
            border-radius: 6px 6px 0 0;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .nav-tab:hover { color: #fff; background: #1f3460; }
        .nav-tab.active { background: #0f3460; color: #00d9ff; }

        .content { background: #16213e; border-radius: 10px; padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0f3460;
        }
        .section-title { font-size: 1.3em; color: #00d9ff; }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #00d9ff;
            font-weight: 500;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 1px solid #1f4068;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #00d9ff;
        }
        .form-textarea { min-height: 120px; resize: vertical; font-family: inherit; }
        .form-textarea.large { min-height: 200px; }

        .activity-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .activity-name { font-size: 1.1em; color: #fff; font-weight: 600; }
        .activity-meta { color: #888; font-size: 12px; }

        .links-list { margin-top: 15px; }
        .link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #1a1a2e;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .link-item a { color: #00d9ff; text-decoration: none; }
        .link-item a:hover { text-decoration: underline; }
        .link-festival { color: #ff9800; min-width: 80px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 1.8em; color: #00d9ff; font-weight: bold; }
        .stat-label { color: #888; font-size: 12px; margin-top: 5px; }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .summary-table th, .summary-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f4068;
        }
        .summary-table th { background: #0f3460; color: #00d9ff; }
        .summary-table tr:hover { background: #1f3460; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: #00c853;
            color: #fff;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        .collapse-btn {
            background: none;
            border: none;
            color: #00d9ff;
            cursor: pointer;
            font-size: 12px;
        }
        .collapsible { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .collapsible.open { max-height: 2000px; }

        .status-saved { color: #00c853; }
        .status-unsaved { color: #ff9800; }

        #lastSaved { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>节日活动知识图谱编辑器</h1>
        <div class="header-actions">
            <span id="lastSaved"></span>
            <span id="saveStatus" class="status-saved">已保存</span>
            <button class="btn btn-success" onclick="saveAll()">💾 保存</button>
            <button class="btn btn-primary" onclick="exportMarkdown()">📄 导出MD</button>
            <button class="btn btn-warning" onclick="exportJSON()">📦 导出JSON</button>
        </div>
    </div>

    <div class="nav-tabs" id="navTabs"></div>

    <div class="content" id="content"></div>

    <div class="toast" id="toast">保存成功！</div>

let data = loadData();
let hasUnsavedChanges = false;

function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            // 合并默认数据，确保新增的活动类型也存在
            for (const key in defaultData.activities) {
                if (!parsed.activities[key]) {
                    parsed.activities[key] = defaultData.activities[key];
                }
            }
            return parsed;
        } catch (e) {
            return JSON.parse(JSON.stringify(defaultData));
        }
    }
    return JSON.parse(JSON.stringify(defaultData));
}

function saveAll() {
    data.lastSaved = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    hasUnsavedChanges = false;
    updateSaveStatus();
    showToast('保存成功！');
}

function markUnsaved() {
    hasUnsavedChanges = true;
    updateSaveStatus();
}

function updateSaveStatus() {
    const statusEl = document.getElementById('saveStatus');
    const lastSavedEl = document.getElementById('lastSaved');

    if (hasUnsavedChanges) {
        statusEl.textContent = '未保存';
        statusEl.className = 'status-unsaved';
    } else {
        statusEl.textContent = '已保存';
        statusEl.className = 'status-saved';
    }

    if (data.lastSaved) {
        const d = new Date(data.lastSaved);
        lastSavedEl.textContent = `上次保存: ${d.toLocaleString('zh-CN')}`;
    }
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function renderTabs() {
    const tabs = document.getElementById('navTabs');
    const activities = Object.keys(data.activities);

    let html = '<button class="nav-tab active" data-tab="summary">📊 总结</button>';
    activities.forEach((name, i) => {
        html += `<button class="nav-tab" data-tab="activity-${i}">${name}</button>`;
    });
    tabs.innerHTML = html;

    tabs.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            showSection(tab.dataset.tab);
        });
    });
}

function showSection(tabId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tabId)?.classList.add('active');
}

function renderContent() {
    const content = document.getElementById('content');
    const activities = Object.keys(data.activities);

    let html = renderSummarySection();
    activities.forEach((name, i) => {
        html += renderActivitySection(name, i);
    });

    content.innerHTML = html;
    bindEvents();
    showSection('summary');
}

function renderSummarySection() {
    return `
    <div class="section active" id="summary">
        <div class="section-header">
            <h2 class="section-title">📊 数据回归总结</h2>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">${Object.keys(data.activities).length}</div>
                <div class="stat-label">活动形式</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">237</div>
                <div class="stat-label">回归记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2024-2026</div>
                <div class="stat-label">数据范围</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">核心结论</label>
            <textarea class="form-textarea large" id="summary-conclusions"
                placeholder="输入核心结论...">${data.summary.conclusions}</textarea>
        </div>

        <div class="form-group">
            <label class="form-label">整体评语</label>
            <textarea class="form-textarea large" id="summary-comments"
                placeholder="输入整体评语...">${data.summary.comments}</textarea>
        </div>
    </div>`;
}

function renderActivitySection(name, index) {
    const activity = data.activities[name];
    const hasData = activity.conclusion || activity.comment;

    return `
    <div class="section" id="activity-${index}">
        <div class="section-header">
            <h2 class="section-title">${name}</h2>
            <span class="activity-meta">${hasData ? '✅ 已填写' : '⏳ 待填写'}</span>
        </div>

        <div class="activity-card">
            <div class="form-group">
                <label class="form-label">数据结论</label>
                <textarea class="form-textarea large" id="conclusion-${index}"
                    placeholder="输入数据结论，每行一条，以 - 开头...">${activity.conclusion}</textarea>
            </div>

            <div class="form-group">
                <label class="form-label">评语</label>
                <textarea class="form-textarea" id="comment-${index}"
                    placeholder="输入评语...">${activity.comment}</textarea>
            </div>
        </div>
    </div>`;
}

function bindEvents() {
    // 总结部分
    document.getElementById('summary-conclusions')?.addEventListener('input', (e) => {
        data.summary.conclusions = e.target.value;
        markUnsaved();
    });
    document.getElementById('summary-comments')?.addEventListener('input', (e) => {
        data.summary.comments = e.target.value;
        markUnsaved();
    });

    // 各活动
    Object.keys(data.activities).forEach((name, i) => {
        document.getElementById(`conclusion-${i}`)?.addEventListener('input', (e) => {
            data.activities[name].conclusion = e.target.value;
            markUnsaved();
        });
        document.getElementById(`comment-${i}`)?.addEventListener('input', (e) => {
            data.activities[name].comment = e.target.value;
            markUnsaved();
        });
    });

    // Ctrl+S 保存
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveAll();
        }
    });
}

function exportMarkdown() {
    let md = `## 七、数据回归索引\n\n> 按活动形式分类的历史数据回归链接（2024-2026）\n\n`;

    Object.entries(data.activities).forEach(([name, activity], i) => {
        md += `### 7.${i + 1} ${name}\n\n`;
        if (activity.conclusion) {
            md += `**数据结论**：\n${activity.conclusion}\n\n`;
        }
        if (activity.comment) {
            md += `**评语**：${activity.comment}\n\n`;
        }
        md += `\n`;
    });

    md += `### 7.${Object.keys(data.activities).length + 1} 数据回归总结\n\n`;
    md += `**核心结论**：\n${data.summary.conclusions}\n\n`;
    md += `**评语**：\n${data.summary.comments}\n`;

    downloadFile('节日活动知识图谱_数据回归.md', md);
    showToast('Markdown 导出成功！');
}

function exportJSON() {
    downloadFile('节日活动知识图谱_数据.json', JSON.stringify(data, null, 2));
    showToast('JSON 导出成功！');
}

function downloadFile(filename, content) {
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

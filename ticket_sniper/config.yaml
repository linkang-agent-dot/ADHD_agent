# ============================================================
# 大麦 App 抢票配置
# ============================================================

# ---- 设备连接 ----
# ADB 设备地址（模拟器或真机）
# MuMu 模拟器: "127.0.0.1:7555"
# 雷电模拟器: "127.0.0.1:5555"
# USB 真机:   留空（自动检测）
device_addr: "127.0.0.1:7555"

# ---- 演出信息 ----
# 大麦 App 中演出的分享链接或 itemId（用于自动跳转）
# 方法：在大麦 App 里打开演出 → 分享 → 复制链接
share_url: "https://m.damai.cn/shows/item.html?itemId=1018638402074"

# ---- 抢购时间 ----
# 留空 = 立即开始
# 格式: "2026-03-15 10:00:00"
start_time: ""

# ---- 票档选择 ----
# 想要的票档关键词（按优先级排列）
# 填票价或名称关键字，如 ["580", "内场", "VIP"]
# 留空 = 自动点击第一个可用票档
wanted_tickets:
  - ""

# ---- 购票数量 ----
ticket_count: 1

# ---- 购票人 ----
# 大麦 App 中已保存的购票人姓名（用于自动勾选）
# 留空 = 使用默认购票人
buyers:
  - ""

# ---- 行为配置 ----
behavior:
  # 每次尝试间隔（毫秒）
  interval_ms: 300
  # 最大尝试次数（0 = 无限）
  max_attempts: 0
  # 成功后截图
  screenshot_on_success: true
